  <style>
    :root {
      --cyan:      #00f5ff;
      --cyan-dim:  rgba(0,245,255,.6);
      --cyan-glow: rgba(0,245,255,.13);
      --magenta:   #ff2d78;
      --bg:        #050810;
      --bg2:       #080d1a;
      --bg3:       #0c1226;
      --text:      #cdd6f4;
      --muted:     #6e7a96;
      --border:    rgba(0,245,255,.11);
    }

    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; padding:0; background: var(--bg); height:100%; }
    body { color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #root { height: 100dvh; overflow: hidden; }

    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .pt-safe { padding-top: max(1.5rem, env(safe-area-inset-top)); }
    .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.4); }

    /* ── BREATHING WATCH BACKGROUND ── */
    @keyframes breathe {
      0%,100% { transform: scale(1.0);  opacity: .18; filter: brightness(.9); }
      50%      { transform: scale(1.04); opacity: .28; filter: brightness(1.15); }
    }
    @keyframes breathe-glow {
      0%,100% { opacity: .5; }
      50%      { opacity: 1; }
    }
    @keyframes scanline {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes blink-cursor {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes float-pip {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes tab-in {
      from { opacity:0; transform: translateX(12px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .spin { animation: spin 1s linear infinite; }

    /* ── WATCH CARD ── */
    .watch-card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg2);
    }
    .watch-card__bg {
      position: absolute; inset: 0;
      background-image: url('./watch-bg.jpg');
      background-size: cover;
      background-position: center 30%;
      opacity: .18;
      transform: scale(1);
      transition: opacity .7s;
    }
    .watch-card__bg.breathing {
      animation: breathe 3.2s ease-in-out infinite;
    }
    .watch-card__grid {
      position: absolute; inset: 0; pointer-events: none;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 32px, rgba(0,245,255,.025) 32px, rgba(0,245,255,.025) 33px),
        repeating-linear-gradient(90deg, transparent, transparent 32px, rgba(0,245,255,.025) 32px, rgba(0,245,255,.025) 33px);
    }
    .watch-card__scanline {
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,.06), transparent);
      animation: scanline 6s linear infinite;
      pointer-events: none;
    }
    .watch-card__vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(5,8,16,.9) 100%);
    }
    .watch-card__glow {
      position: absolute; inset: 0; pointer-events: none;
      border-radius: 20px;
      box-shadow: inset 0 0 60px rgba(0,245,255,.04);
      transition: box-shadow .7s;
    }
    .watch-card__glow.active {
      animation: breathe-glow 3.2s ease-in-out infinite;
      box-shadow: inset 0 0 80px rgba(0,245,255,.12), 0 0 60px rgba(0,245,255,.08);
    }
    .watch-card__content { position: relative; z-index: 2; padding: 1.75rem 1.5rem 1.5rem; }

    /* ── CLOCK DISPLAY ── */
    .clock-digits {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: clamp(2.4rem, 11vw, 3.8rem);
      line-height: 1;
      letter-spacing: 0;
      color: var(--cyan);
      text-shadow: 0 0 30px rgba(0,245,255,.5), 0 0 60px rgba(0,245,255,.2);
      font-variant-numeric: tabular-nums;
    }
    .clock-digits.off {
      color: rgba(110,122,150,.4);
      text-shadow: none;
    }

    /* ── STATUS DOT ── */
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.live {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: breathe-glow 1.4s ease-in-out infinite;
    }

    /* ── CTA BUTTON ── */
    .btn-checkin {
      width: 100%;
      padding: 1.1rem;
      border-radius: 14px;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .04em;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      transition: all .15s;
      border: 1px solid rgba(0,245,255,.25);
      background: rgba(0,245,255,.07);
      color: var(--cyan);
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-checkin:active { transform: scale(.97); }
    .btn-checkin:hover  { background: rgba(0,245,255,.12); border-color: rgba(0,245,255,.4); }
    .btn-checkin.checkout {
      border-color: rgba(255,45,120,.3);
      background: rgba(255,45,120,.07);
      color: var(--magenta);
    }
    .btn-checkin.checkout:hover { background: rgba(255,45,120,.12); border-color: rgba(255,45,120,.5); }

    /* ── NAV TAB ── */
    .nav-tab {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: .5rem .25rem;
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s;
      background: none; border: none; position: relative;
    }
    .nav-tab.active { color: var(--cyan); }
    .nav-tab__label { font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
    .nav-tab__pip {
      position: absolute; bottom: 3px;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
    }

    /* ── FORM INPUTS ── */
    .field-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .65rem .9rem;
      font-size: .85rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .field-input:focus { border-color: rgba(0,245,255,.35); }
    .field-input::placeholder { color: var(--muted); opacity: .6; }
    .field-label {
      font-size: .6rem; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
      display: block; margin-bottom: .5rem;
    }

    /* ── TYPE / CATEGORY PILLS ── */
    .pill-row { display: flex; gap: .5rem; }
    .pill {
      flex: 1; padding: .5rem .4rem;
      border-radius: 8px; font-size: .72rem; font-weight: 700; letter-spacing: .04em;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg3); color: var(--muted);
      transition: all .15s; text-align: center;
    }
    .pill.active-cyan   { border-color: var(--cyan);    background: rgba(0,245,255,.08);  color: var(--cyan); }
    .pill.active-mag    { border-color: var(--magenta); background: rgba(255,45,120,.08); color: var(--magenta); }
    .pill.active-amber  { border-color: #f59e0b;        background: rgba(245,158,11,.08); color: #fbbf24; }
    .pill.active-purple { border-color: #a78bfa;        background: rgba(167,139,250,.08);color: #a78bfa; }
    .pill.active-red    { border-color: #f87171;        background: rgba(248,113,113,.08); color: #f87171; }
    .pill.active-blue   { border-color: #60a5fa;        background: rgba(96,165,250,.08);  color: #60a5fa; }
    .pill.active-green  { border-color: #34d399;        background: rgba(52,211,153,.08);  color: #34d399; }
    .pill:hover:not(.active-cyan):not(.active-mag):not(.active-amber):not(.active-purple):not(.active-red):not(.active-blue):not(.active-green) {
      border-color: rgba(0,245,255,.2); color: var(--text);
    }

    /* ── SECTION CARD ── */
    .section-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }
    .section-label {
      font-size: .6rem; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem;
    }
    .section-label::before {
      content: ''; display: inline-block; width: 16px; height: 1px;
      background: var(--cyan); opacity: .5;
    }

    /* ── SEGMENT PILL ── */
    .seg-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; padding: .2rem .5rem;
      font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--text);
    }
    .seg-pill span { color: var(--cyan); }

    /* ── CAT BADGE ── */
    .cat-badge {
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 6px; border: 1px solid; padding: .15rem .45rem;
      font-size: .65rem; font-weight: 600;
    }

    /* ── CALENDAR ── */
    .cal-day {
      aspect-ratio: 1; border-radius: 8px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: .75rem;
      cursor: pointer; transition: all .15s; border: 1px solid transparent;
    }
    .cal-day:active { transform: scale(.88); }

    /* ── SAVE BUTTON ── */
    .btn-save {
      width: 100%; padding: .85rem; border-radius: 12px;
      font-size: .82rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      border: 1px solid rgba(0,245,255,.3); background: rgba(0,245,255,.08); color: var(--cyan);
      cursor: pointer; transition: all .15s;
    }
    .btn-save:hover  { background: rgba(0,245,255,.14); border-color: rgba(0,245,255,.5); }
    .btn-save:active { transform: scale(.98); }
    .btn-save.saved  { border-color: rgba(52,211,153,.4); background: rgba(52,211,153,.08); color: #34d399; }

    /* ── RECHARTS CUSTOM ── */
    .recharts-default-tooltip { background: var(--bg3) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(5,8,16,.85); backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center; padding: 1rem;
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; } }

    /* ── LOGO ── */
    .logo-mark {
      width: 32px; height: 32px; border-radius: 9px;
      border: 1px solid rgba(0,245,255,.25);
      background: rgba(0,245,255,.06);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── LIVE BADGE ── */
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      border: 1px solid rgba(0,245,255,.2);
      background: rgba(0,245,255,.05);
      border-radius: 100px; padding: .25rem .75rem;
    }
  </style>
</head>

    // ── i18n HELPERS ───────────────────────────────────────────────────────────
    let _t = {};
    const t  = k => _t[k] !== undefined ? _t[k] : k;
    const tt = (key, vars={}) => Object.entries(vars).reduce((s,[k,v])=>s.replace(`{${k}}`,v), t(key));

    const CATS = {
      morning:   { label:'Morning',   Icon: Sun,      pillClass:'active-amber',  color:'#fbbf24', border:'rgba(245,158,11,.3)'  },
      afternoon: { label:'Afternoon', Icon: Sunset,   pillClass:'active-cyan',   color:'#00f5ff', border:'rgba(0,245,255,.3)'   },
      split:     { label:'Split',     Icon: Scissors, pillClass:'active-purple', color:'#a78bfa', border:'rgba(167,139,250,.3)' },
      sick:      { label:'Sick',      Icon: Activity, pillClass:'active-red',    color:'#f87171', border:'rgba(248,113,113,.3)' },
      vacation:  { label:'Vacation',  Icon: Star,     pillClass:'active-green',  color:'#34d399', border:'rgba(52,211,153,.3)'  },
      holiday:   { label:'Holiday',   Icon: Star,     pillClass:'active-blue',   color:'#60a5fa', border:'rgba(96,165,250,.3)'  },
      ot_used:   { label:'OT Used',   Icon: Minus,    pillClass:'active-mag',    color:'#ff2d78', border:'rgba(255,45,120,.3)'  },
      special:   { label:'Special',   Icon: Star,     pillClass:'active-blue',   color:'#60a5fa', border:'rgba(96,165,250,.3)'  },
    };

    // ── UTILS ──────────────────────────────────────────────────────────────────
    const cn = (...c) => c.filter(Boolean).join(' ');
    const pad2 = n => String(n).padStart(2,'0');
    const toH  = m => (m/60).toFixed(1);
    const todayStr = () => format(new Date(),'yyyy-MM-dd');
    const timeToMins = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    const calcDuration = segs => segs.reduce((tot,s) => {
      let a=timeToMins(s.start), b=timeToMins(s.end);
      if (b<a) b+=1440; return tot+(b-a);
    },0);
    const fmtMins = m => { if(!m) return '0h'; const h=Math.floor(m/60),r=m%60; return r?`${h}h ${r}m`:`${h}h`; };
    const fmtElapsed = s => `${pad2(Math.floor(s/3600))}:${pad2(Math.floor(s%3600/60))}:${pad2(s%60)}`;

    const load = (k,fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; }};
    const save = (k,v) => localStorage.setItem(k,JSON.stringify(v));

    // ── HOOK ───────────────────────────────────────────────────────────────────
    function useLS(key, fallback) {
      const [val,setVal] = useState(()=>load(key,fallback));
      const set = useCallback(u => {
        setVal(prev => { const next=typeof u==='function'?u(prev):u; save(key,next); return next; });
      },[key]);
      return [val,set];
    }

    // ── SHARED ─────────────────────────────────────────────────────────────────
    function ConfirmModal({ open, title, sub, okLabel, cancelLabel, danger, onOk, onCancel }) {
      if (!open) return null;
      return (
        <div className="modal-overlay" onClick={onCancel}>
          <motion.div
            initial={{ y:80, opacity:0 }} animate={{ y:0, opacity:1 }} exit={{ y:80, opacity:0 }}
            transition={{ type:'spring', damping:28, stiffness:300 }}
            style={{ width:'100%', maxWidth:'22rem', background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'18px', padding:'1.5rem', boxShadow:'0 0 80px rgba(0,245,255,.06)' }}
            onClick={e=>e.stopPropagation()}>
            <div style={{ display:'flex', alignItems:'flex-start', gap:'.75rem', marginBottom:'1.25rem' }}>
              <AlertTriangle size={16} style={{ color:'#fbbf24', flexShrink:0, marginTop:'2px' }} />
              <div>
                <p style={{ color:'var(--text)', fontWeight:700, fontSize:'.9rem' }}>{title}</p>
                {sub && <p style={{ color:'var(--muted)', fontSize:'.8rem', marginTop:'.3rem' }}>{sub}</p>}
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'.75rem' }}>
              <button onClick={onCancel} style={{ padding:'.85rem', borderRadius:'10px', border:'1px solid var(--border)', background:'none', color:'var(--muted)', fontWeight:600, fontSize:'.82rem', cursor:'pointer' }}>{cancelLabel||t('confirm1_cancel')}</button>
              <button onClick={onOk} style={{ padding:'.85rem', borderRadius:'10px', border:'none', fontWeight:700, fontSize:'.82rem', cursor:'pointer', letterSpacing:'.04em', background: danger?'rgba(255,45,120,.15)':'rgba(0,245,255,.1)', color:danger?'#ff2d78':'var(--cyan)', borderColor:danger?'rgba(255,45,120,.3)':'rgba(0,245,255,.3)', outline: danger?'1px solid rgba(255,45,120,.3)':'1px solid rgba(0,245,255,.3)' }}>
                {okLabel}
              </button>
            </div>
          </motion.div>
        </div>
      );
    }

    function CatBadge({ cat }) {
      const c = CATS[cat]; if(!c) return null;
      const Icon = c.Icon;
      return (
        <span className="cat-badge" style={{ color:c.color, borderColor:c.border, background:`${c.border.replace('.3',',.08')}` }}>
          <Icon size={10} />{t(`cat_${cat}`)}
        </span>
      );
    }

    function SegPill({ seg, isSplit, showPause }) {
      const dur = calcDuration([seg]);
      return (
        <span className="seg-pill">
          {seg.start}→{seg.end}<span>{fmtMins(dur)}</span>
        </span>
      );
    }

    // ── TIMER TAB ──────────────────────────────────────────────────────────────
    function TimerTab({ records, active, onIn, onOut }) {
      const [,tick] = useState(0);
      const [modal,setModal] = useState(null);
      useEffect(()=>{
        if(!active) return;
        const id=setInterval(()=>tick(t=>t+1),1000);
        return()=>clearInterval(id);
      },[active]);

      const recent = useMemo(()=>[...records].filter(r=>r.type==='actual').reverse().slice(0,4),[records]);
      const elapsed = active ? Math.floor((Date.now()-new Date(active.checkIn).getTime())/1000) : 0;
      const now = new Date();

      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
          {/* Watch Card */}
          <div className="watch-card">
            <div className={`watch-card__bg ${active?'breathing':''}`} />
            <div className="watch-card__grid" />
            <div className="watch-card__scanline" />
            <div className="watch-card__vignette" />
            <div className={`watch-card__glow ${active?'active':''}`} />
            <div className="watch-card__content">
              {/* Status row */}
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'1.5rem' }}>
                <div style={{ display:'flex', alignItems:'center', gap:'.5rem' }}>
                  <span className={`status-dot ${active?'live':''}`} />
                  <span style={{ fontSize:'.6rem', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--muted)' }}>
                    {active ? t('shift_active') : t('off_duty')}
                  </span>
                </div>
                {active && (
                  <span style={{ fontSize:'.58rem', fontFamily:'JetBrains Mono,monospace', color:'var(--cyan)', opacity:.7 }}>
                    {format(new Date(active.checkIn),'HH:mm')} → now
                  </span>
                )}
              </div>

              {/* Clock */}
              <div style={{ textAlign:'center', padding:'.5rem 0 1rem' }}>
                <div className={`clock-digits ${active?'':'off'}`}>
                  {active ? fmtElapsed(elapsed) : '--:--:--'}
                </div>
                <p style={{ fontSize:'.72rem', color:'var(--muted)', marginTop:'.6rem', fontFamily:'JetBrains Mono,monospace', letterSpacing:'.06em' }}>
                  {active
                    ? `${format(new Date(active.checkIn),'EEEE, d MMM')}`
                    : format(now,'EEEE, MMMM d')}
                </p>
              </div>

              {/* CTA */}
              <button
                className={`btn-checkin ${active?'checkout':''}`}
                onClick={()=>setModal(active?'out':'in')}>
                {active
                  ? <><LogOut size={15} />{t('check_out')}</>
                  : <><LogIn  size={15} />{t('check_in')}</>}
              </button>
            </div>
          </div>

          {/* Recent */}
          {recent.length > 0 && (
            <div>
              <div className="section-label">{t('recent_shifts')}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
                {recent.map(r=>(
                  <div key={r.id} className="section-card" style={{ padding:'.85rem 1rem', display:'flex', flexDirection:'column', gap:'.4rem' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'.5rem', flexWrap:'wrap' }}>
                      <span style={{ fontSize:'.82rem', color:'var(--text)', fontWeight:600 }}>{format(parseISO(r.date),'EEE, MMM d')}</span>
                      <CatBadge cat={r.category} />
                      {r.durationMinutes!=null && <span style={{ marginLeft:'auto', fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'.82rem', color:'var(--cyan)' }}>{toH(r.durationMinutes)}h</span>}
                    </div>
                    {r.segments?.length>0 && (
                      <div style={{ display:'flex', flexWrap:'wrap', gap:'.3rem' }}>
                        {r.segments.map((s,i)=>(
                          <React.Fragment key={i}>
                            <SegPill seg={s} />
                            {i<r.segments.length-1&&r.category==='split'&&<span style={{ fontSize:'.65rem', color:'var(--muted)', fontFamily:'monospace', padding:'0 .2rem' }}>⋯</span>}
                          </React.Fragment>
                        ))}
                      </div>
                    )}
                    {r.note && <div style={{ display:'flex', alignItems:'center', gap:'.4rem', fontSize:'.72rem', color:'var(--muted)' }}><Info size={10} />{r.note}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {!active && recent.length===0 && (
            <div style={{ textAlign:'center', padding:'2rem 0', color:'var(--muted)' }}>
              <Clock size={36} style={{ margin:'0 auto .75rem', opacity:.15, display:'block' }} />
              <p style={{ fontSize:'.8rem', fontFamily:'JetBrains Mono,monospace' }}>{t('no_shifts_yet')}</p>
            </div>
          )}

          <AnimatePresence>
            {modal && (
              <ConfirmModal open title={modal==='in'?t('confirm_checkin'):t('confirm_checkout')}
                sub={modal==='in'?tt('confirm_checkin_sub',{time:format(now,'HH:mm')}):tt('confirm_checkout_sub',{elapsed:fmtElapsed(elapsed)})}
                okLabel={modal==='in'?t('start_shift'):t('end_shift')} danger={modal==='out'}
                onOk={()=>{ modal==='in'?onIn():onOut(); setModal(null); }}
                onCancel={()=>setModal(null)} />
            )}
          </AnimatePresence>
        </div>
      );
    }

    // ── SEGMENT EDITOR ─────────────────────────────────────────────────────────
    function SegEditor({ segs, onChange }) {
      const add    = ()        => onChange([...segs,{start:'08:00',end:'16:00'}]);
      const remove = i         => onChange(segs.filter((_,j)=>j!==i));
      const upd    = (i,f,v)   => onChange(segs.map((s,j)=>j===i?{...s,[f]:v}:s));
      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
          {segs.map((seg,i)=>(
            <div key={i} style={{ display:'flex', gap:'.5rem', alignItems:'center' }}>
              <div style={{ flex:1, display:'grid', gridTemplateColumns:'1fr 1fr', gap:'.5rem' }}>
                <input type="time" value={seg.start} onChange={e=>upd(i,'start',e.target.value)} className="field-input" style={{ fontFamily:'JetBrains Mono,monospace' }} />
                <input type="time" value={seg.end}   onChange={e=>upd(i,'end',  e.target.value)} className="field-input" style={{ fontFamily:'JetBrains Mono,monospace' }} />
              </div>
              {segs.length>1 && <button onClick={()=>remove(i)} style={{ padding:'.4rem', borderRadius:'7px', border:'1px solid var(--border)', background:'none', color:'var(--muted)', cursor:'pointer', display:'flex', alignItems:'center' }}><X size={13}/></button>}
            </div>
          ))}
          {segs.length<3 && (
            <button onClick={add} style={{ display:'flex', alignItems:'center', gap:'.3rem', background:'none', border:'none', color:'rgba(0,245,255,.5)', fontSize:'.72rem', fontFamily:'JetBrains Mono,monospace', cursor:'pointer', padding:'.2rem 0' }}>
              <Plus size={11}/>{t('add_segment')}
            </button>
          )}
        </div>
      );
    }

    // ── MANUAL FORM ────────────────────────────────────────────────────────────
    const mkForm = ()=>({ date:todayStr(), type:'actual', category:'morning', segs:[{start:'08:00',end:'16:00'}], note:'', overtimeH:0 });

    function ManualForm({ onSave }) {
      const [f,setF] = useState(mkForm);
      const [saved,setSaved] = useState(false);
      const set = (k,v) => setF(p=>({...p,[k]:v}));
      const isAbsence = f.type==='absence';
      const cats = isAbsence?['sick','vacation','holiday','ot_used','special']:['morning','afternoon','split'];

      const doSave = ()=>{
        const segs = isAbsence?[]:f.segs;
        const dur  = f.category==='ot_used'
          ? Math.round(f.overtimeH*60)
          : segs.length?calcDuration(segs):null;
        const otMins = (!isAbsence && f.overtimeH>0) ? Math.round(f.overtimeH*60) : 0;
        onSave({ id:`r_${Date.now()}`, date:f.date, type:f.type, category:f.category, segments:segs, note:f.note.trim(), source:'manual', durationMinutes:dur, overtimeMinutes:otMins });
        setSaved(true);
        setTimeout(()=>{ setSaved(false); setF(mkForm()); },1500);
      };

      return (
        <div className="section-card" style={{ display:'flex', flexDirection:'column', gap:'.9rem' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'.5rem' }}>
            <PenLine size={14} style={{ color:'var(--cyan)' }} />
            <span style={{ fontWeight:700, fontSize:'.88rem' }}>{t('manual_entry')}</span>
          </div>

          <div><label className="field-label">{t('date_label')}</label>
            <input type="date" value={f.date} onChange={e=>set('date',e.target.value)} className="field-input" style={{ fontFamily:'JetBrains Mono,monospace' }} />
          </div>

          <div><label className="field-label">{t('type_label')}</label>
            <div className="pill-row">
              {['actual','planned','absence'].map(tp=>(
                <button key={tp} className={cn('pill', f.type===tp?tp==='absence'?'active-red':'active-cyan':'')} onClick={()=>{ set('type',tp); set('category',tp==='absence'?'sick':'morning'); }}>
                  {t(`type_${tp}`)}
                </button>
              ))}
            </div>
          </div>

          <div><label className="field-label">{t('category_label')}</label>
            <div className="pill-row">
              {cats.map(c=>(
                <button key={c} className={cn('pill', f.category===c?CATS[c].pillClass:'')} onClick={()=>set('category',c)}>
                  {t(`cat_${c}`)}
                </button>
              ))}
            </div>
          </div>

          {!isAbsence && (
            <div>
              <label className="field-label">
                {t('time_segments')}{f.category==='split'&&<span style={{ color:'#a78bfa', marginLeft:'.5rem', opacity:.7 }}>· split</span>}
              </label>
              <SegEditor segs={f.segs} onChange={v=>set('segs',v)} />
            </div>
          )}

          {(!isAbsence || f.category==='ot_used') && (
            <div>
              <label className="field-label">
                {f.category==='ot_used'
                  ? <>{t('cat_ot_used')} <span style={{ opacity:.4, textTransform:'none', letterSpacing:0 }}>{t('ot_deduct')}</span></>
                  : <>{t('overtime_hours')} <span style={{ opacity:.4, textTransform:'none', letterSpacing:0 }}>{t('ot_from_shift')}</span></>
                }
              </label>
              <div style={{ display:'flex', flexWrap:'wrap', gap:'.4rem' }}>
                {[0,.5,1,1.5,2,2.5,3,4,6,8].map(h=>(
                  <button key={h} className={cn('pill', f.overtimeH===h?'active-mag':'')}
                    style={{ flex:'none', padding:'.4rem .55rem', fontSize:'.7rem' }}
                    onClick={()=>set('overtimeH',h)}>
                    {h===0?'—':`${h}h`}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div><label className="field-label">{t('note_label')} <span style={{ opacity:.4, textTransform:'none', letterSpacing:0 }}>{t('note_optional')}</span></label>
            <input type="text" value={f.note} onChange={e=>set('note',e.target.value)} placeholder="doctor visit, overtime…" className="field-input" />
          </div>

          <button className={cn('btn-save',saved?'saved':'')} onClick={doSave}>
            {saved?t('saved'):t('save_record')}
          </button>
        </div>
      );
    }

    // ── AI PARSER ──────────────────────────────────────────────────────────────
    function AIParser({ onImport }) {
      const [apiKey,setApiKey] = useLS(KEYS.GEMINI,'');
      const [showKey,setShowKey] = useState(false);
      const [file,setFile]       = useState(null);
      const [loading,setLoading] = useState(false);
      const [parsed,setParsed]   = useState(null);
      const [err,setErr]         = useState('');
      const fileRef = useRef();

      const handleFile = e => {
        const f = e.dataTransfer?.files?.[0]||e.target?.files?.[0];
        if(f){ setFile(f); setParsed(null); setErr(''); }
      };
      const readB64  = f=>new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(f); });
      const readText = f=>new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsText(f); });

      const parse = async()=>{
        if(!apiKey){ setErr('Enter Gemini API key first.'); return; }
        if(!file){   setErr('Drop a file first.'); return; }
        setLoading(true); setErr('');
        const today=todayStr();
        const prompt=`You are a kitchen work schedule parser. Extract all shifts.\nReturn ONLY a JSON array: [{"date":"YYYY-MM-DD","category":"morning"|"afternoon"|"split"|"sick"|"special","segments":[{"start":"HH:mm","end":"HH:mm"}],"note":""}]\nEmpty segments [] for sick/special. Split=2 segments. 24h. Today: ${today}.`;
        try {
          const isImg=file.type.startsWith('image/');
          const parts=isImg?[{inline_data:{mime_type:file.type,data:await readB64(file)}},{text:prompt}]:[{text:`${prompt}\n\nDocument:\n${await readText(file)}`}];
          const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts}]})});
          if(!res.ok) throw new Error(`API ${res.status}`);
          const data=await res.json();
          const txt=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
          const m=txt.match(/\[[\s\S]*\]/);
          if(!m) throw new Error('No JSON in response');
          setParsed(JSON.parse(m[0]));
        } catch(e){ setErr(e.message); }
        setLoading(false);
      };

      const doImport=()=>{
        if(!parsed) return;
        onImport(parsed.map(s=>({
          id:`r_${Date.now()}_${Math.random().toString(36).slice(2)}`,
          date:s.date, type:'planned', category:s.category||'morning',
          segments:s.segments||[], note:s.note||'', source:'document',
          durationMinutes:s.segments?.length?calcDuration(s.segments):null,
        })));
        setParsed(null); setFile(null);
      };

      return (
        <div className="section-card" style={{ display:'flex', flexDirection:'column', gap:'.9rem' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'.5rem' }}>
              <div style={{ width:18,height:18,borderRadius:5,background:'rgba(96,165,250,.12)',border:'1px solid rgba(96,165,250,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.6rem',fontWeight:800,color:'#60a5fa' }}>G</div>
              <span style={{ fontWeight:700, fontSize:'.88rem' }}>{t('chefs_intel')}</span>
              <span style={{ fontSize:'.58rem', fontWeight:700, letterSpacing:'.07em', background:'rgba(96,165,250,.08)', border:'1px solid rgba(96,165,250,.2)', color:'#60a5fa', borderRadius:5, padding:'.15rem .4rem' }}>AI</span>
            </div>
            <button onClick={()=>setShowKey(k=>!k)} style={{ fontSize:'.62rem', letterSpacing:'.07em', background:'none', border:'none', color:'var(--muted)', cursor:'pointer' }}>
              {showKey?t('hide'):t('set_key')}
            </button>
          </div>

          <AnimatePresence>
            {showKey && (
              <motion.div initial={{height:0,opacity:0}} animate={{height:'auto',opacity:1}} exit={{height:0,opacity:0}} style={{overflow:'hidden'}}>
                <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="Gemini API key — stored locally only" className="field-input" style={{ fontFamily:'JetBrains Mono,monospace', fontSize:'.75rem' }} />
              </motion.div>
            )}
          </AnimatePresence>

          <div
            onDrop={e=>{e.preventDefault();handleFile(e);}} onDragOver={e=>e.preventDefault()}
            onClick={()=>fileRef.current?.click()}
            style={{ border:`2px dashed ${file?'rgba(0,245,255,.25)':'rgba(110,122,150,.2)'}`, borderRadius:12, padding:'1.25rem', textAlign:'center', cursor:'pointer', background:file?'rgba(0,245,255,.03)':'none', transition:'all .2s' }}>
            <input ref={fileRef} type="file" accept="image/*,.txt" className="hidden" style={{display:'none'}} onChange={handleFile} />
            {file
              ? <><FileText size={24} style={{margin:'0 auto .5rem',display:'block',color:'var(--cyan)'}}/><p style={{fontSize:'.8rem',color:'var(--text)',fontWeight:600}}>{file.name}</p><p style={{fontSize:'.68rem',color:'var(--muted)',marginTop:'.2rem'}}>{(file.size/1024).toFixed(0)} KB</p></>
              : <><Upload size={24} style={{margin:'0 auto .5rem',display:'block',color:'var(--muted)',opacity:.4}}/><p style={{fontSize:'.78rem',color:'var(--muted)'}}>{t('drop_file')}</p></>
            }
          </div>

          <button onClick={parse} disabled={loading||!file}
            style={{ width:'100%',padding:'.8rem',borderRadius:10,border:'1px solid rgba(96,165,250,.25)',background:loading||!file?'rgba(110,122,150,.05)':'rgba(96,165,250,.08)',color:loading||!file?'var(--muted)':'#60a5fa',fontWeight:700,fontSize:'.8rem',letterSpacing:'.06em',cursor:loading||!file?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem' }}>
            {loading?<><span className="spin" style={{display:'inline-block',width:14,height:14,border:'2px solid rgba(96,165,250,.3)',borderTop:'2px solid #60a5fa',borderRadius:'50%'}}/>{t('parsing')}</>:t('parse_btn')}
          </button>

          {err && <p style={{ fontSize:'.72rem', color:'#f87171', fontFamily:'JetBrains Mono,monospace' }}>{err}</p>}

          {parsed && (
            <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
              <span style={{ fontSize:'.62rem', color:'var(--muted)', letterSpacing:'.1em', textTransform:'uppercase', fontWeight:600 }}>{tt('shifts_detected',{n:parsed.length})}</span>
              <div style={{ maxHeight:'10rem', overflowY:'auto' }} className="no-scroll">
                {parsed.map((s,i)=>(
                  <div key={i} style={{ display:'flex',flexWrap:'wrap',gap:'.3rem',alignItems:'center',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'.5rem .7rem',marginBottom:'.3rem' }}>
                    <CatBadge cat={s.category} />
                    <span style={{ fontSize:'.7rem', color:'var(--muted)', fontFamily:'monospace' }}>{s.date}</span>
                    {s.segments?.map((seg,j)=><SegPill key={j} seg={seg}/>)}
                  </div>
                ))}
              </div>
              <button onClick={doImport}
                style={{ width:'100%',padding:'.8rem',borderRadius:10,border:'1px solid rgba(52,211,153,.3)',background:'rgba(52,211,153,.08)',color:'#34d399',fontWeight:700,fontSize:'.8rem',letterSpacing:'.05em',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem' }}>
                <CheckCircle2 size={14}/>{t('import_as_planned')}
              </button>
            </div>
          )}

          <p style={{ fontSize:'.6rem', color:'rgba(110,122,150,.4)', textAlign:'center', fontFamily:'JetBrains Mono,monospace', letterSpacing:'.06em' }}>
            🔒 {t('api_privacy')}
          </p>
        </div>
      );
    }

    // ── PLAN TAB ───────────────────────────────────────────────────────────────
    function PlanTab({ records, onBulkFill }) {
      const [month,setMonth]       = useState(new Date());
      const [selected,setSelected] = useState(null);

      const days    = useMemo(()=>eachDayOfInterval({start:startOfMonth(month),end:endOfMonth(month)}),[month]);
      const firstOff= (getDay(days[0])+6)%7;
      const DOW     = ['M','T','W','T','F','S','S'];

      const dayMap = useMemo(()=>{
        const m={};
        records.forEach(r=>{ if(!m[r.date])m[r.date]=[]; m[r.date].push(r); });
        return m;
      },[records]);

      const plannedCnt = days.filter(d=>dayMap[format(d,'yyyy-MM-dd')]?.some(r=>r.type==='planned')).length;

      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
          {/* Month nav */}
          <div className="section-card" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'.9rem 1.1rem' }}>
            <button onClick={()=>setMonth(m=>subMonths(m,1))} style={{ padding:'.4rem', borderRadius:8, border:'1px solid var(--border)', background:'none', color:'var(--muted)', cursor:'pointer' }}><ChevronLeft size={16}/></button>
            <div style={{ textAlign:'center' }}>
              <p style={{ fontWeight:700, color:'var(--text)', fontSize:'.95rem' }}>{format(month,'MMMM yyyy')}</p>
              <p style={{ fontSize:'.65rem', color:'var(--muted)', fontFamily:'JetBrains Mono,monospace', marginTop:'.15rem' }}>{tt('planned_count',{n:plannedCnt})}</p>
            </div>
            <button onClick={()=>setMonth(m=>addMonths(m,1))} style={{ padding:'.4rem', borderRadius:8, border:'1px solid var(--border)', background:'none', color:'var(--muted)', cursor:'pointer' }}><ChevronRight size={16}/></button>
          </div>

          <button onClick={()=>onBulkFill(month)}
            style={{ width:'100%',padding:'.8rem',borderRadius:12,border:'1px solid rgba(0,245,255,.15)',background:'rgba(0,245,255,.04)',color:'rgba(0,245,255,.7)',fontWeight:600,fontSize:'.8rem',letterSpacing:'.05em',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem' }}>
            <Zap size={14}/>{t('bulk_fill')}
          </button>

          {/* Calendar */}
          <div className="section-card" style={{ padding:'1rem' }}>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:'.5rem' }}>
              {DOW.map((d,i)=>(
                <div key={i} style={{ textAlign:'center', fontSize:'.58rem', fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', padding:'.3rem 0', color:i>=5?'rgba(110,122,150,.25)':'var(--muted)' }}>{d}</div>
              ))}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2 }}>
              {Array.from({length:firstOff}).map((_,i)=><div key={`e${i}`}/>)}
              {days.map(day=>{
                const ds     = format(day,'yyyy-MM-dd');
                const recs   = dayMap[ds]||[];
                const hasPlan= recs.some(r=>r.type==='planned');
                const hasAct = recs.some(r=>r.type==='actual');
                const hasAbs = recs.some(r=>r.type==='absence');
                const hasNote= recs.some(r=>r.note);
                const isSplit= recs.some(r=>r.category==='split');
                const today  = isToday(day);
                const wknd   = isWeekend(day);
                const isSel  = selected===ds;

                let bg='transparent', color=wknd?'rgba(110,122,150,.2)':'rgba(110,122,150,.5)', border='transparent';
                if(hasAbs)  { bg='rgba(248,113,113,.1)'; color='#f87171'; border='rgba(248,113,113,.25)'; }
                else if(hasAct&&hasPlan) { bg='rgba(52,211,153,.1)'; color='#34d399'; border='rgba(52,211,153,.25)'; }
                else if(hasAct)  { bg='rgba(110,122,150,.08)'; color='var(--text)'; border='rgba(110,122,150,.2)'; }
                else if(hasPlan) { bg='rgba(0,245,255,.06)'; color='var(--cyan)'; border='rgba(0,245,255,.2)'; }

                return (
                  <button key={ds} className="cal-day"
                    onClick={()=>setSelected(isSel?null:ds)}
                    style={{ background:bg, color, border:`1px solid ${today?'rgba(0,245,255,.45)':isSel?'rgba(255,255,255,.2)':border}`, boxShadow:today?'0 0 10px rgba(0,245,255,.08)':'none' }}>
                    <span style={{ lineHeight:1 }}>{format(day,'d')}</span>
                    <div style={{ display:'flex', gap:2, marginTop:2, height:4 }}>
                      {hasNote  && <span style={{ width:3,height:3,borderRadius:'50%',background:'#60a5fa' }}/>}
                      {isSplit  && <span style={{ width:3,height:3,borderRadius:'50%',background:'#a78bfa' }}/>}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Day detail */}
          <AnimatePresence>
            {selected && (
              <motion.div key={selected} initial={{opacity:0,y:-6}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-6}}
                className="section-card" style={{ display:'flex', flexDirection:'column', gap:'.75rem' }}>
                <p style={{ fontSize:'.72rem', fontFamily:'JetBrains Mono,monospace', color:'var(--muted)' }}>{format(parseISO(selected),'EEEE, MMMM d, yyyy')}</p>
                {(dayMap[selected]||[]).length===0 && <p style={{ fontSize:'.8rem', color:'var(--muted)', fontFamily:'monospace' }}>{t('no_records_day')}</p>}
                {(dayMap[selected]||[]).map(r=>(
                  <div key={r.id} style={{ display:'flex', flexDirection:'column', gap:'.4rem', paddingBottom:'.75rem', borderBottom:'1px solid var(--border)' }} className="last:border-0 last:pb-0">
                    <div style={{ display:'flex', alignItems:'center', gap:'.4rem', flexWrap:'wrap' }}>
                      <span style={{ fontSize:'.6rem', fontFamily:'monospace', textTransform:'uppercase', letterSpacing:'.08em', padding:'.15rem .4rem', borderRadius:5, border:`1px solid ${r.type==='actual'?'var(--border)':r.type==='planned'?'rgba(0,245,255,.2)':'rgba(248,113,113,.2)'}`, color:r.type==='actual'?'var(--muted)':r.type==='planned'?'var(--cyan)':'#f87171' }}>{r.type}</span>
                      <CatBadge cat={r.category} />
                      {r.durationMinutes!=null && <span style={{ marginLeft:'auto', fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'.8rem', color:'var(--cyan)' }}>{toH(r.durationMinutes)}h</span>}
                    </div>
                    {r.segments?.length>0 && (
                      <div style={{ display:'flex', flexWrap:'wrap', gap:'.3rem' }}>
                        {r.segments.map((seg,i)=>(
                          <React.Fragment key={i}>
                            <SegPill seg={seg}/>
                            {i<r.segments.length-1&&r.category==='split'&&<span style={{ fontSize:'.62rem', color:'var(--muted)', fontFamily:'monospace' }}>⋯ pause ⋯</span>}
                          </React.Fragment>
                        ))}
                      </div>
                    )}
                    {r.note && <div style={{ display:'flex', gap:'.35rem', fontSize:'.7rem', color:'var(--muted)' }}><Info size={10}/>{r.note}</div>}
                  </div>
                ))}
              </motion.div>
            )}
          </AnimatePresence>

          {/* Legend */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'.5rem .75rem' }}>
            {[['rgba(0,245,255,.2)','rgba(0,245,255,.06)','var(--cyan)',t('legend_planned')],['rgba(52,211,153,.25)','rgba(52,211,153,.1)','#34d399',t('legend_actual_planned')],['rgba(110,122,150,.2)','rgba(110,122,150,.08)','var(--text)',t('legend_actual')],['rgba(248,113,113,.25)','rgba(248,113,113,.1)','#f87171',t('legend_absence')]].map(([br,bg,c,l])=>(
              <div key={l} style={{ display:'flex', alignItems:'center', gap:'.4rem', fontSize:'.62rem', color:'var(--muted)' }}>
                <span style={{ width:10,height:10,borderRadius:3,border:`1px solid ${br}`,background:bg,flexShrink:0,display:'inline-block' }}/>
                {l}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── STATS TAB ──────────────────────────────────────────────────────────────
    const ChartTip = ({active,payload,label})=>{
      if(!active||!payload?.length) return null;
      return (
        <div style={{ background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:10, padding:'.6rem .9rem', fontSize:'.72rem', boxShadow:'0 0 30px rgba(0,0,0,.5)' }}>
          <p style={{ color:'var(--muted)', marginBottom:'.4rem', fontFamily:'monospace' }}>{label}</p>
          {payload.map(p=><p key={p.name} style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:p.color }}>{p.name}: {p.value}h</p>)}
        </div>
      );
    };

    function StatsTab({ records }) {
      const now=new Date();
      const totals=useMemo(()=>{
        const actual  =records.filter(r=>r.type==='actual' &&r.durationMinutes!=null).reduce((s,r)=>s+r.durationMinutes,0);
        const planned =records.filter(r=>r.type==='planned'&&r.durationMinutes!=null).reduce((s,r)=>s+r.durationMinutes,0);
        const otEarned=records.filter(r=>r.type==='actual' &&r.overtimeMinutes>0).reduce((s,r)=>s+(r.overtimeMinutes||0),0);
        const otUsed  =records.filter(r=>r.type==='absence'&&r.category==='ot_used').reduce((s,r)=>s+(r.durationMinutes||480),0);
        const sick    =records.filter(r=>r.category==='sick').length;
        const vacation=records.filter(r=>r.category==='vacation').length;
        const holiday =records.filter(r=>r.category==='holiday').length;
        const special =records.filter(r=>r.category==='special').length;
        return{actual,planned,balance:actual-planned,otEarned,otUsed,otBank:otEarned-otUsed,sick,vacation,holiday,special};
      },[records]);

      const weekData=useMemo(()=>Array.from({length:8},(_,i)=>{
        const wS=startOfWeek(subWeeks(now,7-i),{weekStartsOn:1});
        const wE=new Date(wS); wE.setDate(wE.getDate()+6); wE.setHours(23,59,59,999);
        const inW=r=>{const d=parseISO(r.date);return d>=wS&&d<=wE;};
        const aMin=records.filter(r=>r.type==='actual' &&inW(r)&&r.durationMinutes!=null).reduce((s,r)=>s+r.durationMinutes,0);
        const pMin=records.filter(r=>r.type==='planned'&&inW(r)&&r.durationMinutes!=null).reduce((s,r)=>s+r.durationMinutes,0);
        return{week:format(wS,'MMM d'),actual:parseFloat((aMin/60).toFixed(1)),planned:parseFloat((pMin/60).toFixed(1))};
      }),[records]);

      const daily=useMemo(()=>{
        const dates=[...new Set(records.map(r=>r.date))].sort((a,b)=>b.localeCompare(a)).slice(0,7);
        return dates.map(date=>{
          const recs=records.filter(r=>r.date===date);
          const aMin=recs.filter(r=>r.type==='actual' &&r.durationMinutes!=null).reduce((s,r)=>s+r.durationMinutes,0);
          const pMin=recs.filter(r=>r.type==='planned'&&r.durationMinutes!=null).reduce((s,r)=>s+r.durationMinutes,0);
          const first=recs.find(r=>r.type==='actual'&&r.segments?.length);
          return{date,aMin,pMin,delta:aMin-pMin,checkIn:first?.segments?.[0]?.start,checkOut:first?.segments?.[first.segments.length-1]?.end};
        });
      },[records]);

      const bal=totals.balance/60;
      const isOver=bal>0.05, isUnder=bal<-0.05;

      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
          {/* Delta */}
          <div className="section-card" style={{ borderColor:isOver?'rgba(52,211,153,.2)':isUnder?'rgba(248,113,113,.2)':'var(--border)', background:isOver?'rgba(52,211,153,.04)':isUnder?'rgba(248,113,113,.04)':'var(--bg2)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'.5rem', marginBottom:'.5rem' }}>
              {isOver?<TrendingUp size={14} style={{color:'#34d399'}}/>:isUnder?<TrendingDown size={14} style={{color:'#f87171'}}/>:<Minus size={14} style={{color:'var(--muted)'}}/>}
              <span style={{ fontSize:'.6rem', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--muted)' }}>{t('all_time_balance')}</span>
            </div>
            <div style={{ fontSize:'clamp(2.5rem,12vw,3.5rem)', fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:isOver?'#34d399':isUnder?'#f87171':'var(--muted)', textShadow:isOver?'0 0 30px rgba(52,211,153,.3)':isUnder?'0 0 30px rgba(248,113,113,.3)':'none' }}>
              {bal>=0?'+':''}{bal.toFixed(1)}h
            </div>
            <p style={{ fontSize:'.78rem', color:isOver?'rgba(52,211,153,.5)':isUnder?'rgba(248,113,113,.5)':'var(--muted)', marginTop:'.25rem' }}>
              {isOver?t('overtime_text'):isUnder?t('undertime_text'):t('on_track_text')}
            </p>
            <div style={{ display:'flex', gap:'2rem', marginTop:'1rem', paddingTop:'1rem', borderTop:'1px solid var(--border)' }}>
              <div><p style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('worked_label')}</p><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'1.1rem', color:'var(--cyan)' }}>{toH(totals.actual)}h</p></div>
              <div><p style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('planned_label')}</p><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'1.1rem', color:'var(--muted)' }}>{toH(totals.planned)}h</p></div>
            </div>
          </div>

          {(totals.otEarned>0||totals.otUsed>0)&&(()=>{
            const bank=totals.otBank/60;
            const isPos=bank>0.05, isNeg=bank<-0.05;
            return(
            <div className="section-card" style={{ borderColor:'rgba(255,45,120,.2)', background:'rgba(255,45,120,.03)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'.5rem', marginBottom:'.5rem' }}>
                <Minus size={14} style={{color:'var(--magenta)'}}/>
                <span style={{ fontSize:'.6rem', fontWeight:700, letterSpacing:'.15em', textTransform:'uppercase', color:'var(--muted)' }}>{t('overtime_bank')}</span>
              </div>
              <div style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'2rem', color:isPos?'#34d399':isNeg?'#f87171':'var(--muted)' }}>
                {bank>=0?'+':''}{bank.toFixed(1)}h
              </div>
              <div style={{ display:'flex', gap:'2rem', marginTop:'.75rem', paddingTop:'.75rem', borderTop:'1px solid var(--border)' }}>
                <div><p style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('earned_label')}</p><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:'var(--magenta)' }}>+{(totals.otEarned/60).toFixed(1)}h</p></div>
                <div><p style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('used_label')}</p><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, color:'var(--muted)' }}>-{(totals.otUsed/60).toFixed(1)}h</p></div>
              </div>
            </div>
            );
          })()}

          {(totals.sick>0||totals.vacation>0||totals.holiday>0||totals.special>0)&&(
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'.75rem' }}>
              {totals.sick>0&&<div className="section-card" style={{ borderColor:'rgba(248,113,113,.2)', background:'rgba(248,113,113,.04)' }}><div style={{ display:'flex', gap:'.4rem', alignItems:'center', marginBottom:'.4rem' }}><Activity size={12} style={{color:'#f87171'}}/><span style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('cat_sick_stat')}</span></div><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'2rem', color:'#f87171' }}>{totals.sick}</p></div>}
              {totals.vacation>0&&<div className="section-card" style={{ borderColor:'rgba(52,211,153,.2)', background:'rgba(52,211,153,.04)' }}><div style={{ display:'flex', gap:'.4rem', alignItems:'center', marginBottom:'.4rem' }}><Star size={12} style={{color:'#34d399'}}/><span style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('cat_vacation_stat')}</span></div><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'2rem', color:'#34d399' }}>{totals.vacation}</p></div>}
              {totals.holiday>0&&<div className="section-card" style={{ borderColor:'rgba(96,165,250,.2)', background:'rgba(96,165,250,.04)' }}><div style={{ display:'flex', gap:'.4rem', alignItems:'center', marginBottom:'.4rem' }}><Star size={12} style={{color:'#60a5fa'}}/><span style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('cat_holiday_stat')}</span></div><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'2rem', color:'#60a5fa' }}>{totals.holiday}</p></div>}
              {totals.special>0&&<div className="section-card" style={{ borderColor:'rgba(96,165,250,.2)', background:'rgba(96,165,250,.04)' }}><div style={{ display:'flex', gap:'.4rem', alignItems:'center', marginBottom:'.4rem' }}><Star size={12} style={{color:'#60a5fa'}}/><span style={{ fontSize:'.58rem', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.1em', fontWeight:600 }}>{t('cat_special_stat')}</span></div><p style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'2rem', color:'#60a5fa' }}>{totals.special}</p></div>}
            </div>
          )}

          {/* Chart */}
          <div className="section-card">
            <div className="section-label">{t('week_chart')}</div>
            {records.length>0?(
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={weekData} margin={{top:0,right:0,left:-28,bottom:0}} barGap={3}>
                  <CartesianGrid strokeDasharray="2 4" stroke="rgba(0,245,255,.05)" vertical={false}/>
                  <XAxis dataKey="week" tick={{fill:'var(--muted)',fontSize:9,fontFamily:'monospace'}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fill:'var(--muted)',fontSize:9,fontFamily:'monospace'}} axisLine={false} tickLine={false}/>
                  <Tooltip content={<ChartTip/>} cursor={{fill:'rgba(0,245,255,.03)'}}/>
                  <Bar dataKey="planned" name={t('planned_label')} fill="rgba(110,122,150,.3)" radius={[3,3,0,0]} maxBarSize={16}/>
                  <Bar dataKey="actual"  name={t('worked_label')}  fill="var(--cyan)"          radius={[3,3,0,0]} maxBarSize={16}/>
                </BarChart>
              </ResponsiveContainer>
            ):(
              <div style={{ height:180, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--muted)', fontSize:'.8rem', fontFamily:'monospace' }}>{t('no_data')}</div>
            )}
          </div>

          {daily.length>0&&(
            <div>
              <div className="section-label">{t('daily_detail')}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:'.5rem' }}>
                {daily.map(d=>{
                  const delta=d.delta/60;
                  return(
                    <div key={d.date} className="section-card" style={{ padding:'.8rem 1rem' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'.3rem' }}>
                        <span style={{ fontSize:'.82rem', fontWeight:600, color:'var(--text)' }}>{format(parseISO(d.date),'EEE, MMM d')}</span>
                        <span style={{ fontFamily:'JetBrains Mono,monospace', fontWeight:700, fontSize:'.8rem', color:delta>0.05?'#34d399':delta<-0.05?'#f87171':'var(--muted)' }}>{delta>=0?'+':''}{delta.toFixed(1)}h</span>
                      </div>
                      <div style={{ display:'flex', gap:'1rem', fontSize:'.7rem', fontFamily:'JetBrains Mono,monospace', color:'var(--muted)', flexWrap:'wrap' }}>
                        {d.checkIn &&<span>IN {d.checkIn}</span>}
                        {d.checkOut&&<span>OUT {d.checkOut}</span>}
                        {d.aMin>0  &&<span style={{color:'var(--cyan)'}}>{fmtMins(d.aMin)}</span>}
                        {d.pMin>0  &&<span>/ {fmtMins(d.pMin)} {t('planned_stat')}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── SETTINGS MODAL ────────────────────────────────────────────────────────
    const LANG_OPTIONS = [
      { code:'en', flag:'🇬🇧', label:'EN' },
      { code:'de', flag:'🇩🇪', label:'DE' },
      { code:'it', flag:'🇮🇹', label:'IT' },
      { code:'cs', flag:'🇨🇿', label:'CS' },
      { code:'sk', flag:'🇸🇰', label:'SK' },
      { code:'hu', flag:'🇭🇺', label:'HU' },
    ];

    function SettingsModal({ onClose, onReset, lang, onLangChange }) {
      const [step, setStep] = useState(0);

      const confirmReset = () => { onReset(); onClose(); };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <motion.div
            initial={{ y:80, opacity:0 }} animate={{ y:0, opacity:1 }} exit={{ y:80, opacity:0 }}
            transition={{ type:'spring', damping:28, stiffness:300 }}
            style={{ width:'100%', maxWidth:'22rem', background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'18px', padding:'1.5rem', boxShadow:'0 0 80px rgba(0,245,255,.06)' }}
            onClick={e=>e.stopPropagation()}>

            {step===0 && (
              <>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'1.25rem' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'.5rem' }}>
                    <Settings size={14} style={{ color:'var(--cyan)' }}/>
                    <span style={{ fontWeight:700, fontSize:'.9rem', color:'var(--text)' }}>{t('settings_title')}</span>
                  </div>
                  <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer', padding:'.2rem', display:'flex' }}><X size={15}/></button>
                </div>

                {/* Language Picker */}
                <div style={{ marginBottom:'1.25rem' }}>
                  <p style={{ fontSize:'.6rem', fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--muted)', marginBottom:'.65rem' }}>{t('lang_label')}</p>
                  <div style={{ display:'flex', gap:'.4rem', flexWrap:'wrap' }}>
                    {LANG_OPTIONS.map(({code,flag,label})=>(
                      <button key={code}
                        className={`pill ${lang===code?'active-cyan':''}`}
                        style={{ flex:'none', padding:'.45rem .6rem', fontSize:'.72rem', display:'flex', alignItems:'center', gap:'.3rem' }}
                        onClick={()=>onLangChange(code)}>
                        <span>{flag}</span>{label}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1rem' }}>
                  <p style={{ fontSize:'.6rem', fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'#f87171', marginBottom:'.75rem', opacity:.7 }}>{t('danger_zone')}</p>
                  <button onClick={()=>setStep(1)}
                    style={{ width:'100%', padding:'.75rem 1rem', borderRadius:10, border:'1px solid rgba(248,113,113,.25)', background:'rgba(248,113,113,.04)', color:'#f87171', fontWeight:700, fontSize:'.82rem', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:'.5rem', letterSpacing:'.04em' }}>
                    <Trash2 size={14}/>{t('delete_data_btn')}
                  </button>
                </div>
              </>
            )}

            {step===1 && (
              <>
                <div style={{ display:'flex', alignItems:'flex-start', gap:'.75rem', marginBottom:'1rem' }}>
                  <AlertTriangle size={16} style={{ color:'#fbbf24', flexShrink:0, marginTop:'2px' }}/>
                  <div>
                    <p style={{ color:'var(--text)', fontWeight:700, fontSize:'.9rem' }}>{t('confirm1_title')}</p>
                    <p style={{ color:'var(--muted)', fontSize:'.8rem', marginTop:'.35rem', lineHeight:1.5 }}>{t('confirm1_sub')}</p>
                  </div>
                </div>
                <div style={{ display:'flex', gap:'.6rem', marginTop:'1.25rem' }}>
                  <button onClick={onClose} style={{ flex:1, padding:'.7rem', borderRadius:10, border:'1px solid var(--border)', background:'none', color:'var(--muted)', fontWeight:600, fontSize:'.82rem', cursor:'pointer' }}>{t('confirm1_cancel')}</button>
                  <button onClick={()=>setStep(2)} style={{ flex:1, padding:'.7rem', borderRadius:10, border:'1px solid rgba(248,113,113,.35)', background:'rgba(248,113,113,.08)', color:'#f87171', fontWeight:700, fontSize:'.82rem', cursor:'pointer' }}>{t('confirm1_ok')}</button>
                </div>
              </>
            )}

            {step===2 && (
              <>
                <div style={{ display:'flex', alignItems:'flex-start', gap:'.75rem', marginBottom:'1rem' }}>
                  <AlertTriangle size={16} style={{ color:'#f87171', flexShrink:0, marginTop:'2px' }}/>
                  <div>
                    <p style={{ color:'#f87171', fontWeight:700, fontSize:'.9rem' }}>{t('confirm2_title')}</p>
                    <p style={{ color:'var(--muted)', fontSize:'.8rem', marginTop:'.35rem', lineHeight:1.5 }}>{t('confirm2_sub')}</p>
                  </div>
                </div>
                <div style={{ display:'flex', gap:'.6rem', marginTop:'1.25rem' }}>
                  <button onClick={onClose} style={{ flex:1, padding:'.7rem', borderRadius:10, border:'1px solid var(--border)', background:'none', color:'var(--muted)', fontWeight:600, fontSize:'.82rem', cursor:'pointer' }}>{t('confirm2_cancel')}</button>
                  <button onClick={confirmReset} style={{ flex:1, padding:'.7rem', borderRadius:10, border:'none', background:'#f87171', color:'#050810', fontWeight:800, fontSize:'.82rem', cursor:'pointer', letterSpacing:'.04em' }}>{t('confirm2_ok')}</button>
                </div>
              </>
            )}
          </motion.div>
        </div>
      );
    }

    // ── APP ────────────────────────────────────────────────────────────────────
    const TABS = [
      { id:'timer', tkey:'tab_timer', Icon: Clock        },
      { id:'entry', tkey:'tab_log',   Icon: PenLine       },
      { id:'plan',  tkey:'tab_plan',  Icon: CalendarDays  },
      { id:'stats', tkey:'tab_stats', Icon: BarChart3     },
    ];

    function App() {
      const [tab,          setTab]         = useState('timer');
      const [records,      setRecs]        = useLS(KEYS.RECORDS,[]);
      const [active,       setActive]      = useLS(KEYS.ACTIVE, null);
      const [showSettings, setShowSettings]= useState(false);
      const [lang,         setLang]        = useLS('cs_lang', 'en');

      // Initialize module-level translation dict on every render
      _t = TRANS[lang] || TRANS.en;

      const handleReset = useCallback(()=>{
        Object.values(KEYS).forEach(k=>localStorage.removeItem(k));
        setRecs([]);
        setActive(null);
      },[setRecs,setActive]);

      const handleIn = useCallback(()=>{
        const now=new Date();
        setActive({id:`a_${Date.now()}`,date:format(now,'yyyy-MM-dd'),checkIn:now.toISOString()});
      },[setActive]);

      const handleOut = useCallback(()=>{
        if(!active) return;
        const now=new Date(), ci=new Date(active.checkIn);
        const cat=ci.getHours()<12?'morning':'afternoon';
        const mins=Math.round((now.getTime()-ci.getTime())/60000);
        setRecs(prev=>[...prev,{
          id:`r_${Date.now()}`, date:active.date, type:'actual', category:cat,
          segments:[{start:format(ci,'HH:mm'),end:format(now,'HH:mm')}],
          note:'', source:'timer', durationMinutes:mins,
        }]);
        setActive(null);
      },[active,setRecs,setActive]);

      const handleSave   = useCallback(rec=>setRecs(p=>[...p,rec]),[setRecs]);
      const handleImport = useCallback(recs=>setRecs(p=>[...p,...recs]),[setRecs]);
      const handleBulkFill = useCallback(monthDate=>{
        const all=eachDayOfInterval({start:startOfMonth(monthDate),end:endOfMonth(monthDate)});
        const ex=new Set(records.filter(r=>r.type==='planned').map(r=>r.date));
        setRecs(prev=>[...prev,...all.filter(d=>!isWeekend(d)&&!ex.has(format(d,'yyyy-MM-dd'))).map(d=>({
          id:`r_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
          date:format(d,'yyyy-MM-dd'), type:'planned', category:'morning',
          segments:[{start:'08:00',end:'16:00'}], note:'', source:'manual', durationMinutes:480,
        }))]);
      },[records,setRecs]);

      return (
        <div style={{ display:'flex', flexDirection:'column', maxWidth:'28rem', margin:'0 auto', background:'var(--bg)', height:'100dvh' }}>
          {/* Header */}
          <header style={{ flexShrink:0, padding:'max(1.5rem, env(safe-area-inset-top)) 1.25rem .9rem', borderBottom:'1px solid var(--border)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'.75rem' }}>
              <div className="logo-mark">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div>
                <h1 style={{ fontSize:'.95rem', fontWeight:700, color:'var(--text)', letterSpacing:'.01em', lineHeight:1.2 }}>TrueHours</h1>
                <p style={{ fontSize:'.55rem', fontWeight:700, letterSpacing:'.18em', textTransform:'uppercase', color:'var(--muted)', opacity:.7, marginTop:'.1rem' }}>{t('app_subtitle')}</p>
              </div>
              <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:'.5rem' }}>
                {active && (
                  <div className="live-badge">
                    <span className="status-dot live" />
                    <span style={{ fontSize:'.58rem', fontWeight:700, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--cyan)' }}>{t('live')}</span>
                  </div>
                )}
                <button onClick={()=>setShowSettings(true)}
                  style={{ padding:'.45rem', borderRadius:8, border:'1px solid var(--border)', background:'none', color:'var(--muted)', cursor:'pointer', display:'flex', alignItems:'center', transition:'all .15s' }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor='rgba(0,245,255,.3)'; e.currentTarget.style.color='var(--cyan)'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--muted)'; }}>
                  <Settings size={15}/>
                </button>
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="no-scroll" style={{ flex:1, overflowY:'auto', padding:'1rem 1rem 0' }}>
            <AnimatePresence mode="wait" initial={false}>
              <motion.div key={tab}
                initial={{opacity:0,x:10}} animate={{opacity:1,x:0}} exit={{opacity:0,x:-10}}
                transition={{duration:.14,ease:[.4,0,.2,1]}}>
                {tab==='timer' && <TimerTab records={records} active={active} onIn={handleIn} onOut={handleOut}/>}
                {tab==='entry' && <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}><ManualForm onSave={handleSave}/><AIParser onImport={handleImport}/></div>}
                {tab==='plan'  && <PlanTab  records={records} onBulkFill={handleBulkFill}/>}
                {tab==='stats' && <StatsTab records={records}/>}
              </motion.div>
            </AnimatePresence>
            <div style={{ height:'1rem' }}/>
          </main>

          {/* Settings Modal */}
          <AnimatePresence>
            {showSettings && (
              <SettingsModal onClose={()=>setShowSettings(false)} onReset={handleReset} lang={lang} onLangChange={setLang}/>
            )}
          </AnimatePresence>

          {/* Tab Bar */}
          <nav style={{ flexShrink:0, borderTop:'1px solid var(--border)', background:'var(--bg)', padding:'.4rem .5rem max(.75rem, env(safe-area-inset-bottom))' }}>
            <div style={{ display:'flex' }}>
              {TABS.map(({id,tkey,Icon})=>{
                const isA=tab===id;
                return(
                  <button key={id} className={`nav-tab ${isA?'active':''}`} onClick={()=>setTab(id)}>
                    <Icon size={18} strokeWidth={isA?2.5:1.8}
                      style={{ filter:isA?'drop-shadow(0 0 6px rgba(0,245,255,.5))':'none' }}/>
                    <span className="nav-tab__label">{t(tkey)}</span>
                    {isA && (
                      <motion.span layoutId="tab-pip" className="nav-tab__pip"
                        transition={{type:'spring',stiffness:420,damping:32}}/>
                    )}
                  </button>
                );
              })}
            </div>
          </nav>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
